<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI iFrame Test</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .iframe-container {
            flex: 1;
            min-width: 500px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 3000px; /* Increased 5x to accommodate extremely long reports */
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Power BI Embedded Reports Test</h1>
    <p>This page simulates embedding your Azure Static Web App inside iframes on another system (like SharePoint or a custom portal).</p>

    <div class="container">
        <!-- LGCAP Report iFrame -->
        <div class="iframe-container">
            <h2>LGCAP Report</h2>
            <p>URL Payload: <code>?report=lgcap</code></p>
            <iframe src="https://jolly-plant-06eefdd10.4.azurestaticapps.net/?report=lgcap" allowfullscreen="true"></iframe>
        </div>

        <!-- CEEI Report iFrame -->
        <div class="iframe-container">
            <h2>CEEI Report</h2>
            <p>URL Payload: <code>?report=ceei</code></p>
            <iframe src="https://jolly-plant-06eefdd10.4.azurestaticapps.net/?report=ceei" allowfullscreen="true"></iframe>
        </div>
    </div>

</body>
</html>
